version: '3.8'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_feedback
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://user:password@db:5432/ai_feedback
      JWT_SECRET: change_this_secret
      ACCESS_TOKEN_EXPIRY: 15m
      REFRESH_TOKEN_EXPIRY_DAYS: 30
      ALLOW_ADMIN_REG: "true"
    ports:
      - "4000:4000"

volumes:
  db-data:
