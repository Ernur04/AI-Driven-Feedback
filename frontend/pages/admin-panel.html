<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Панелі - AI-Driven Feedback</title>
    <link rel="icon" type="image/png" href="../logo/logo3.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <a href="../index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 12px;">
                    <img src="../logo/logo3.png" alt="Logo">
                    <h1><span class="gradient-text">AI-Driven</span> Feedback</h1>
                </a>
            </div>
                <div class="user-actions">
                    <!-- USER PROFILE WRAPPER -->
                    <div class="user-profile-wrapper" id="userProfileWrapper" style="display: flex;">
                        <button id="profileTrigger" class="profile-trigger" aria-label="Профиль менюін ашу">
                            <img src="../logo/default-user.webp" alt="User Avatar" class="avatar-small" id="userAvatarSmall">
                        </button>

                        <div class="user-profile glass" id="userProfile" style="display: none;">
                            <div class="profile-header">
                                <img src="../logo/default-user.webp" alt="User Avatar" class="avatar" id="userAvatar">
                                <div class="user-info">
                                    <h2 id="userName">Ernur</h2>
                                    <p id="userRole">Admin</p>
                                </div>
                            </div>
                            <div class="profile-menu">
                                <button id="btnProfile" class="profile-btn">
                                    <i class="fa-solid fa-user"></i> Жеке профиль
                                </button>
                                <button id="btnLogout" class="logout-btn">
                                    <i class="fa-solid fa-right-from-bracket"></i> Шығу
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
        </div>
    </header>

    <main class="container">
        <div class="dashboard-container">
            <!-- Sidebar -->
            <aside class="dashboard-sidebar">
                <div class="sidebar-card glass">
                    <div class="sidebar-user">
                        <div class="avatar-edit-wrapper">
                            <img src="../logo/default-user.webp" alt="User" class="avatar-large" id="profileAvatarBig">
                            <input type="file" id="avatarUpload" hidden accept="image/*">
                        </div>
                        <h2 id="profileNameBig">Админ</h2>
                        <p id="profileRoleBig">Administrator</p>
                    </div>
                    <ul class="sidebar-nav">
                        <li><a href="admin-panel.html" class="active"><i class="fa-solid fa-user-shield"></i> Жеке профиль</a></li>
                        <li><a href="admin-users.html"><i class="fa-solid fa-users"></i> Пайдаланушылар</a></li>
                        <li><a href="admin-line.html"><i class="fa-solid fa-chart-line"></i> Статистика</a></li>
                        <li><a href="../index.html"><i class="fa-solid fa-house"></i> Басты бет</a></li>
                    </ul>
                </div>
            </aside>

            <div class="dashboard-main">
                <h1 class="section-title">Жеке профиль</h1>

                <form id="profileCombinedForm" class="profile-form">
                    
                    <div class="profile-header-card glass shadow">
                        <div class="profile-cover" id="coverPreview" style="background-image: url('../logo/default-cover.jpg');">
                            <label for="coverUpload" class="btn-cover-edit" title="Мұқабаны өзгерту">
                                <i class="fa-solid fa-camera"></i> <span>Cover өзгерту</span>
                            </label>
                            <input type="file" id="coverUpload" hidden accept="image/*">
                        </div>
                        
                        <div class="profile-avatar-bar">
                            <div class="avatar-container">
                                <img src="../logo/default-user.webp" alt="User" id="profileAvatarMain">
                                <button type="button" id="btnChangeAvatarMain" class="btn-avatar-edit">
                                    <i class="fa-solid fa-pen"></i>
                                </button>
                            </div>
                            <div class="profile-title-text">
                                <h2 id="displayAdminName">Админ</h2>
                                <p><i class="fa-solid fa-user-shield"></i> Басқарушы (Administrator)</p>
                            </div>
                        </div>
                    </div>

                    <div class="profile-details-grid">
                        
                        <div class="feature-card glass shadow">
                            <div class="card-header">
                                <h2 class="card-title"><i class="fa-solid fa-address-card"></i> Жеке мәліметтер</h2>
                            </div>
                            <div class="card-body">
                                <div class="form-grid">
                                    <div class="form-group">
                                        <label for="editName">Аты-жөні</label>
                                        <input type="text" id="editName" required placeholder="Толық атыңыз">
                                    </div>
                                    <div class="form-group">
                                        <label for="editBirth">Туған күні</label>
                                        <input type="date" id="editBirth">
                                    </div>
                                    <div class="form-group">
                                        <label for="editEmail">Электрондық пошта (Email)</label>
                                        <input type="email" id="editEmail" required placeholder="email@example.com">
                                    </div>
                                    <div class="form-group">
                                        <label for="editPhone">Телефон нөмірі</label>
                                        <input type="tel" id="editPhone" placeholder="+7 (___) ___-__-__">
                                    </div>
                                    <div class="form-group full-width">
                                        <label for="editAddress">Мекен-жайы</label>
                                        <input type="text" id="editAddress" placeholder="Қала, көше, үй нөмірі">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="feature-card glass shadow">
                            <div class="card-header">
                                <h2 class="card-title"><i class="fa-solid fa-key"></i> Құпиясөзді өзгерту</h2>
                            </div>
                            <div class="card-body">
                                <div class="form-grid single-column">
                                    <div class="form-group">
                                        <label for="currentPassword">Қазіргі пароль</label>
                                        <div class="password-wrapper">
                                            <input type="password" id="currentPassword" placeholder="••••••••">
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label for="newPassword">Жаңа пароль</label>
                                        <div class="password-wrapper">
                                            <input type="password" id="newPassword" placeholder="Жаңа құпиясөз">
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label for="confirmPassword">Парольді растау</label>
                                        <div class="password-wrapper">
                                            <input type="password" id="confirmPassword" placeholder="Қайталау">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="form-actions">
                        <button type="submit" class="save-btn glass">
                            <i class="fa-solid fa-floppy-disk"></i> Өзгерістерді сақтау
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-links">
                <a href="privacy.html">Құпиялылық саясаты</a>
                <a href="terms.html">Пайдалану шарттары</a>
            </div>
            <div class="footer-text">
                <p><small>&copy; 2026 AI-Driven Feedback. Барлық құқықтар қорғалған.</small></p>
            </div>
        </div>
    </footer>

    <script src="../js/config.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/profile.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
